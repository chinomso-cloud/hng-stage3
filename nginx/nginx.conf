events {
    worker_connections 1024;
}

http {
    # Custom JSON format for the anomaly engine
    log_format hng_json escape=json '{'
        '"source_ip": "$remote_addr", '
        '"timestamp": "$time_iso8601", '
        '"method": "$request_method", '
        '"path": "$request_uri", '
        '"status": "$status", '
        '"response_size": $body_bytes_sent'
    '}';

    server {
        listen 80;

        # The shared volume path inside the container
        access_log /var/log/nginx/hng-access.log hng_json;

        location / {
            proxy_pass http://nextcloud:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            # CRITICAL: Forward the real IP for the detector to see
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
