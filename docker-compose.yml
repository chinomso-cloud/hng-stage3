version: '3.8'

services:
  nextcloud:
    image: kefaslungu/hng-nextcloud
    container_name: hng-nextcloud
    restart: always
    networks:
      - hng-net

  nginx:
    image: nginx:latest
    container_name: hng-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - HNG-nginx-logs:/var/log/nginx # Named volume for log sharing
    networks:
      - hng-net
    depends_on:
      - nextcloud

volumes:
  HNG-nginx-logs: # Shared with your Python detector later

networks:
  hng-net:
